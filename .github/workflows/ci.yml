name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20.19.2
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11.9"
      - name: Enable pinned pnpm
        run: corepack enable && corepack prepare pnpm@10.12.1 --activate
      - name: Install planning dependency
        run: python -m pip install PyYAML==6.0.2
      - name: Install workspace dependencies
        run: corepack pnpm install --frozen-lockfile
      - name: Install Chromium for E2E
        run: corepack pnpm exec playwright install --with-deps chromium
      - name: Verify P00 baseline
        run: corepack pnpm verify
