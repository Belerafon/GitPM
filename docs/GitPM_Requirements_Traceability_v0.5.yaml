verification_checks:
- id: VFY-001
  title: Clean install и health
  stage: P00
  mandatory_from: alpha
  test_type: smoke
  environment: integration-local
  actor: implementer
  preconditions:
  - clean checkout
  - pinned toolchain
  steps:
  - install dependencies
  - build and start server
  - request live and ready endpoints
  expected_result:
  - build succeeds
  - health endpoints return success
  - correlation ID appears in structured log
  evidence:
  - health response
  - sanitized log
  requirements:
  - OBS-001
- id: VFY-002
  title: Planning maintenance и gate infrastructure
  stage: P00
  mandatory_from: alpha
  test_type: planning
  environment: integration-local
  actor: implementer
  preconditions:
  - active planning documents
  steps:
  - run planning validator
  - run mutation self-tests
  - run alpha gate checker against pending status
  expected_result:
  - plan validation passes
  - mutations are rejected
  - gate checker reports unmet evidence without false success
  evidence:
  - validator output
  - mutation output
  - gate report
  requirements:
  - PLAN-001
  - GATE-001
- id: VFY-003
  title: Filesystem, Git runner и credential spike
  stage: P00S
  mandatory_from: alpha
  test_type: security
  environment: security-local
  actor: SEC
  preconditions:
  - hostile repository fixtures
  - credential capture harness
  steps:
  - attempt command/ref injection
  - attempt symlink swap
  - run push credential helper fixture
  expected_result:
  - unsafe inputs rejected
  - write remains inside worktree
  - token absent from argv, URL, files and logs
  evidence:
  - security test report
  - process inspection output
  requirements:
  - SEC-001
  - TOKEN-001
- id: VFY-004
  title: Approved schema v1 fixture
  stage: P01
  mandatory_from: alpha
  test_type: integration
  environment: integration-local
  actor: QA
  preconditions:
  - schema baseline and demo portfolio
  steps:
  - validate valid fixture
  - validate Project directory exception
  - validate invalid cross-project references
  expected_result:
  - valid fixture passes
  - Project path rule is enforced
  - invalid references fail with stable codes
  evidence:
  - fixture commit SHA
  - validation reports
  requirements:
  - IDENT-001
  - DOMAIN-001
  - REPO-001
- id: VFY-005
  title: Format round-trip
  stage: P02
  mandatory_from: alpha
  test_type: unit
  environment: integration-local
  actor: QA
  preconditions:
  - valid schema fixture
  steps:
