    section: 16. OAuth 2.0 и GitLab integration
  owner: ARCH
  stage: P06
  release_gate: alpha
  acceptance_criteria:
  - В API и runtime отсутствует webhook endpoint/state.
  checks:
  - VFY-017
  - VFY-023
- id: SINGLE-REPO-001
  description: Server обслуживает один configured repository
  source:
    document: GitPM_Implementation_Plan_v0.7.md
