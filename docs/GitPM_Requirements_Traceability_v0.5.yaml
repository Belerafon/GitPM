requirements:
- id: ARCH-001
  description: Git является единственным источником бизнес-данных
  source:
    document: GitPM_Implementation_Plan_v0.7.md
    section: 1. Цель и источник истины
  owner: ARCH
  stage: P01
  release_gate: alpha
  acceptance_criteria:
  - Бизнес-сущности восстанавливаются из repository files без отдельной базы.
  checks:
  - VFY-024
- id: REPO-001
  description: v0.1 использует выделенный GitPM repository
  source:
    document: GitPM_Implementation_Plan_v0.7.md
    section: 3. Выделенный repository
  owner: ARCH
  stage: P01
  release_gate: alpha
  acceptance_criteria:
  - Unknown top-level domain content отклоняется validation.
  checks:
  - VFY-004
- id: IDENT-001
  description: Один immutable ID и явное Project path exception
  source:
    document: GitPM_Implementation_Plan_v0.7.md
    section: 4. Единая идентичность
  owner: ARCH
  stage: P01
  release_gate: alpha
  acceptance_criteria:
  - Внутренние ссылки используют ID; Project directory и project.yaml проверяются отдельно.
  checks:
  - VFY-004
  - VFY-019
- id: DOMAIN-001
  description: Schema v1 baseline утвержден до parser implementation
  source:
    document: GitPM_Implementation_Plan_v0.7.md
    section: 6. Schema v1 baseline
  owner: ARCH
  stage: P01
  release_gate: alpha
  acceptance_criteria:
  - Все поля, единицы и связи v0.1 определены до выхода P01.
  checks:
  - VFY-004
  - VFY-019
- id: YAML-001
  description: Канонический и безопасный YAML profile
  source:
    document: GitPM_Implementation_Plan_v0.7.md
    section: 7. YAML profile
  owner: BE
  stage: P02
  release_gate: alpha
  acceptance_criteria:
  - Formatter идемпотентен; опасные YAML features отклоняются.
  checks:
  - VFY-005
  - VFY-014
- id: VALID-001
  description: Структурная, ссылочная и циклическая валидация
  source:
    document: GitPM_Implementation_Plan_v0.7.md
    section: 13. Validation и CLI
  owner: BE
  stage: P02
  release_gate: alpha
  acceptance_criteria:
  - Invalid fixtures получают stable error codes.
  checks:
  - VFY-006
  - VFY-010
- id: CAL-001
  description: Calendar schema и date utilities определены до API/UI
  source:
    document: GitPM_Implementation_Plan_v0.7.md
    section: 6.7. Calendar
  owner: BE
  stage: P02
  release_gate: alpha
  acceptance_criteria:
  - Weekday and holiday rules единообразны во validation, Gantt и Workload.
  checks:
  - VFY-006
  - VFY-020
  - VFY-027
  - VFY-028
- id: GIT-SYNC-001
  description: Новый draft создается только после успешного fetch от current remote main
  source:
    document: GitPM_Implementation_Plan_v0.7.md
    section: 8. Git clone, fetch и main synchronization
  owner: BE
  stage: P03
  release_gate: alpha
  acceptance_criteria:
  - base_commit равен последнему fetched origin/default branch; stale offline creation запрещен.
  checks:
  - VFY-007
- id: DRAFT-001
  description: Draft имеет owner, explicit lifecycle и conservative cleanup
  source:
    document: GitPM_Implementation_Plan_v0.7.md
    section: 9. Draft lifecycle и ownership
  owner: BE
  stage: P03
  release_gate: alpha
  acceptance_criteria:
  - Close не удаляет данные; dirty draft не очищается автоматически.
  checks:
  - VFY-007
  - VFY-018
- id: WRITER-001
  description: В одном draft одновременно разрешен один writer mode
  source:
    document: GitPM_Implementation_Plan_v0.7.md
    section: 9. Draft lifecycle и ownership
  owner: BE
  stage: P03
  release_gate: alpha
  acceptance_criteria:
  - UI и external agent не выполняют concurrent mutations.
  checks:
  - VFY-008
  - VFY-018
  - VFY-029
- id: DURABILITY-001
  description: Локальная сохранность ограничена persistent volume
  source:
    document: GitPM_Implementation_Plan_v0.7.md
    section: 11. Локальная сохранность без backup
  owner: BE
  stage: P03
  release_gate: alpha
  acceptance_criteria:
  - Completed atomic write переживает restart; потеря volume не покрывается.
  checks:
  - VFY-008
  - VFY-031
- id: DELETE-001
  description: Archive и physical delete являются разными операциями
  source:
    document: GitPM_Implementation_Plan_v0.7.md
    section: 12. Delete и archive
  owner: BE
  stage: P04
  release_gate: alpha
  acceptance_criteria:
  - Delete removes file and is restricted by references; archive preserves file.
  checks:
  - VFY-009
  - VFY-010
- id: RESTORE-001
  description: Восстановление выполняется штатными Git operations
  source:
    document: GitPM_Implementation_Plan_v0.7.md
    section: 14. Changes и restore
  owner: BE
  stage: P05
  release_gate: alpha
  acceptance_criteria:
  - File, deleted file and hunk restore проходят stale protection and validation.
  checks:
  - VFY-012
  - VFY-013
  - VFY-014
  - VFY-021
- id: AUTH-001
  description: GitLab access level напрямую определяет простую роль GitPM
  source:
    document: GitPM_Implementation_Plan_v0.7.md
    section: 17. Простая модель прав
  owner: SEC
  stage: P06
  release_gate: alpha
  acceptance_criteria:
  - Role refresh выполняется перед publish operations; non-member denied.
  checks:
  - VFY-015
  - VFY-017
  - VFY-020
- id: TOKEN-001
  description: OAuth token хранится только в памяти и безопасно передается Git
  source:
