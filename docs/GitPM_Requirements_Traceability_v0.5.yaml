- id: VFY-032
  title: Localization framework and mandatory Russian release acceptance
  stage: P14
  mandatory_from: release
  test_type: acceptance
  environment: browser-local
  actor: QA
  preconditions:
  - feature-complete release candidate
  - registered en and ru locale packs
  - synthetic third-locale fixture for registry test
  steps:
  - run locale key, placeholder, plural-branch and raw-HTML validation
  - select ru and traverse all mandatory UI areas including representative validation and Git errors
  - verify Russian date-only, number, duration and plural formatting
  - verify locale-neutral CLI preserves UTF-8 Cyrillic repository content on Windows
  - reload browser and confirm locale persistence, then register synthetic test locale without component changes
  expected_result:
  - ru has no missing keys, fallback strings or placeholder mismatches
  - all mandatory web UI surfaces are understandable in Russian and CLI round-trips UTF-8 Cyrillic content
  - locale change modifies no YAML files, Git status or API/JSON contracts
  - html lang and dir match locale metadata and selected locale persists after reload
  - third locale is enabled only by locale pack and registry metadata
  evidence:
  - localization completeness report
  - Playwright trace and Russian screenshots
  - CLI UTF-8 transcript
  requirements:
  - I18N-001
