requirements:
- id: ID-ULID-001
  description: ULID is the immutable canonical identity for every entity; filenames, internal references and mutation routes
    use ULID.
  source:
    document: GitPM_Implementation_Plan_v0.4.md
    section: '4'
  owner: ARCH
  stage: P01
  release_gate: alpha
  acceptance_criteria:
  - Changing display key does not rename files or rewrite references.
  - Mutation routes reject display key as canonical ID.
  tests:
  - E2E-002
  - E2E-003
  - E2E-041
- id: ID-KEY-001
  description: Display key is a mutable human-readable attribute resolved to ULID for lookup only.
  source:
    document: GitPM_Implementation_Plan_v0.4.md
    section: '4'
  owner: ARCH
  stage: P01
  release_gate: alpha
  acceptance_criteria:
  - Display key uniqueness rules are validated.
  - Rename produces a one-file diff.
  tests:
  - E2E-003
- id: ARCH-GIT-001
  description: Git is the source of truth and all accepted changes are commits and Merge Requests.
  source:
    document: GitPM_Implementation_Plan_v0.4.md
    section: '3'
  owner: ARCH
  stage: P03
  release_gate: alpha
  acceptance_criteria:
  - No business entity exists only in application state.
  - Main is changed only through GitLab MR.
  tests:
  - E2E-010
  - E2E-011
  - E2E-012
  - E2E-014
- id: ARCH-NODB-001
  description: v0.1 has no persistent database for business data.
  source:
    document: GitPM_Implementation_Plan_v0.4.md
    section: '7'
  owner: ARCH
  stage: P04
  release_gate: alpha
  acceptance_criteria:
  - Restart reconstructs models from Git/files.
  tests:
  - E2E-020
  - E2E-033
- id: REPO-SINGLE-001
  description: One configured portfolio repository is supported per v0.1 server instance.
  source:
    document: GitPM_Delivery_Policies_v0.2.md
    section: '3'
  owner: ARCH
  stage: P06B
  release_gate: alpha
  acceptance_criteria:
  - UI has no repository selector.
  - Foreign project webhooks do not mutate state.
  tests:
  - E2E-001
  - E2E-043
- id: DATA-FILE-001
  description: One entity is stored per canonical YAML file named by ULID.
  source:
    document: GitPM_Implementation_Plan_v0.4.md
    section: '5'
  owner: BE
  stage: P01
  release_gate: alpha
  acceptance_criteria:
  - Create/update/delete map to one entity file unless relationships are explicitly changed.
  tests:
  - E2E-002
  - E2E-003
  - E2E-005
- id: DATA-YAML-001
  description: Canonical YAML forbids comments in domain files, aliases, anchors, custom tags and duplicate keys.
  source:
    document: GitPM_Delivery_Policies_v0.2.md
    section: '6'
  owner: BE
  stage: P02
  release_gate: alpha
  acceptance_criteria:
  - Formatter is idempotent.
  - Unsupported syntax fails explicitly.
  tests:
  - E2E-009
  - E2E-031
- id: DATA-MIGRATE-001
  description: Schema migration is explicit, dry-runnable, Git-visible and reversible by Git.
  source:
    document: GitPM_Implementation_Plan_v0.4.md
    section: '9'
  owner: BE
  stage: P02
  release_gate: alpha
  acceptance_criteria:
  - No implicit migration on read.
  - Dry-run writes nothing.
  tests:
  - E2E-031
  - E2E-032
- id: DATA-DELETE-001
  description: Physical delete is allowed and uses referential restrict by default.
  source:
    document: GitPM_Implementation_Plan_v0.4.md
    section: '8'
  owner: BE
  stage: P04
  release_gate: alpha
  acceptance_criteria:
  - Unreferenced entity can be deleted.
  - Referenced entity deletion is atomic and blocked.
  tests:
  - E2E-005
  - E2E-006
  - E2E-007
- id: GIT-WORKTREE-001
  description: Each draft has a separate branch and worktree.
  source:
    document: GitPM_Implementation_Plan_v0.4.md
    section: '10'
  owner: BE
  stage: P03
  release_gate: alpha
  acceptance_criteria:
  - Drafts do not share writable working directories.
  tests:
  - E2E-001
  - E2E-020
- id: GIT-LOCAL-DURABILITY-001
  description: Dirty drafts survive process/container restart on the same persistent volume and can recover a lost worktree
    from a local safety ref.
  source:
    document: GitPM_Delivery_Policies_v0.2.md
    section: '8'
  owner: BE
  stage: P03
  release_gate: alpha
  acceptance_criteria:
  - No off-volume backup is implemented or promised.
  - Loss of the entire persistent volume is documented as unrecoverable for unpushed data.
  tests:
  - E2E-033
  - E2E-034
- id: GIT-RESTORE-001
  description: v0.1 restores whole files, deleted files and hunks; arbitrary selected-line restore is excluded.
  source:
    document: GitPM_Implementation_Plan_v0.4.md
    section: '11'
  owner: BE
  stage: P05
  release_gate: alpha
  acceptance_criteria:
  - Restore checks stale diff and revalidates YAML.
  tests:
  - E2E-007
  - E2E-008
- id: GIT-HISTORY-001
  description: History, revert, rebase and conflict operations remain native Git workflows.
  source:
    document: GitPM_Implementation_Plan_v0.4.md
    section: '12'
  owner: BE
  stage: P10B
  release_gate: beta
  acceptance_criteria:
  - Revert uses a new draft/MR.
  - Abort rebase restores prior state.
  tests:
  - E2E-015
  - E2E-017
  - E2E-018
  - E2E-019
- id: SEC-GIT-001
  description: Git commands run through an allowlisted isolated runner resistant to hooks, filters, external diff, unsafe
    protocols and command injection.
  source:
    document: GitPM_Security_Baseline_v0.2.md
    section: '5'
  owner: SEC
  stage: P03
  release_gate: alpha
  acceptance_criteria:
  - No shell execution.
  - Malicious repository fixtures cannot execute code.
  tests:
  - E2E-026
  - E2E-028
- id: SEC-BROWSER-001
  description: Browser rendering is protected by sanitization, CSP, clickjacking and URL policies.
  source:
    document: GitPM_Security_Baseline_v0.2.md
    section: '7'
  owner: SEC
  stage: P07
  release_gate: alpha
  acceptance_criteria:
  - Task, Markdown, commit and GitLab metadata XSS payloads do not execute.
  tests:
  - E2E-002
  - E2E-013
- id: SEC-TOKEN-001
  description: OAuth tokens are encrypted with a mounted-secret keyring and never exposed in logs, URLs or process arguments.
  source:
    document: GitPM_Security_Baseline_v0.2.md
    section: '8'
  owner: SEC
  stage: P06A
  release_gate: alpha
  acceptance_criteria:
  - Rotation preserves access.
  - Lost key forces re-authentication only.
  tests:
  - E2E-026
  - E2E-035
  - E2E-036
- id: SEC-WEBHOOK-001
  description: Webhooks are authenticated, replay-resistant, idempotent and bound to the configured GitLab project.
  source:
    document: GitPM_Security_Baseline_v0.2.md
    section: '9'
  owner: SEC
  stage: P06B
  release_gate: alpha
  acceptance_criteria:
  - Forged, replayed and foreign-project events cause no mutation.
  tests:
  - E2E-013
  - E2E-027
  - E2E-043
- id: AUTHZ-MATRIX-001
  description: A single authorization engine maps GitLab identity and GitPM policies to decisions and rechecks critical operations.
  source:
    document: GitPM_Delivery_Policies_v0.2.md
    section: '9'
  owner: SEC
  stage: P06A
  release_gate: alpha
  acceptance_criteria:
  - Deny has priority.
  - Commit, push and MR recheck permissions.
  - Config changes are diff-checked.
  tests:
  - E2E-006
  - E2E-025
- id: OPS-QUOTA-001
  description: Server quotas bound drafts, worktrees, file sizes, requests, diffs and agent bulk operations atomically.
  source:
    document: GitPM_Delivery_Policies_v0.2.md
    section: '10'
  owner: SRE
  stage: P04
  release_gate: alpha
  acceptance_criteria:
  - Quota violation writes nothing.
  tests:
  - E2E-029
- id: OBS-EARLY-001
  description: Health, structured logs, correlation IDs and component metrics are added when each risky component appears.
  source:
    document: GitPM_Implementation_Plan_v0.4.md
    section: '18'
  owner: SRE
  stage: P00
  release_gate: alpha
  acceptance_criteria:
  - Git, HTTP, OAuth and webhook failures are diagnosable before P13.
  tests:
  - E2E-020
  - E2E-021
  - E2E-027
- id: GITLAB-REAL-001
  description: P06B and Alpha require evidence from a real self-hosted GitLab test project.
  source:
    document: GitPM_Work_Plan_v0.3.md
    section: P06B
  owner: QA
  stage: P06B
  release_gate: alpha
  acceptance_criteria:
  - Scopes, authorship, protected branch and webhooks are tested against real GitLab.
  tests:
  - E2E-001
  - E2E-011
  - E2E-012
  - E2E-013
  - E2E-025
- id: UI-CORE-001
  description: Core UI supports projects, tasks, milestones, people and teams according to the editable entity matrix.
  source:
    document: GitPM_Implementation_Plan_v0.4.md
    section: '15'
  owner: FE
  stage: P08B
  release_gate: alpha
  acceptance_criteria:
  - CRUD and role behavior match policies.
  tests:
  - E2E-002
  - E2E-003
  - E2E-004
  - E2E-005
  - E2E-006
  - E2E-041
- id: UI-CHANGES-001
  description: Changes UI exposes file and semantic diff, validation, restore, commit, push and MR.
  source:
    document: GitPM_Implementation_Plan_v0.4.md
    section: '16'
  owner: FE
  stage: P09
  release_gate: alpha
  acceptance_criteria:
  - Full workflow works without terminal.
  tests:
  - E2E-007
  - E2E-008
  - E2E-009
  - E2E-010
  - E2E-011
  - E2E-012
- id: UI-BOARD-001
  description: Board and saved views persist only through Git-backed entities.
  source:
    document: GitPM_Implementation_Plan_v0.4.md
    section: '15'
  owner: FE
  stage: P11A
  release_gate: beta
  acceptance_criteria:
  - Drag and saved view changes appear in YAML diff.
  tests:
  - E2E-037
  - E2E-042
- id: SCHED-CALENDAR-001
  description: Calendars and scheduling rules are explicit, timezone-aware and tested for DST.
  source:
    document: GitPM_Implementation_Plan_v0.4.md
    section: '17'
  owner: BE
  stage: P11B
  release_gate: beta
  acceptance_criteria:
  - Calendar changes deterministically affect scheduling.
  tests:
  - E2E-039
- id: UI-GANTT-001
  description: Gantt edits write canonical schedule fields and pass normal validation.
  source:
    document: GitPM_Implementation_Plan_v0.4.md
    section: '17'
  owner: FE
  stage: P11C
  release_gate: beta
  acceptance_criteria:
  - Date drag changes YAML and semantic diff.
  tests:
  - E2E-038
- id: UI-WORKLOAD-001
  description: Workload calculates explainable allocation and overload from calendars and capacity.
  source:
    document: GitPM_Implementation_Plan_v0.4.md
    section: '17'
  owner: BE
  stage: P11D
  release_gate: beta
  acceptance_criteria:
  - Known fixtures produce exact allocations.
  tests:
  - E2E-040
  - E2E-041
- id: AGENT-SCOPE-001
  description: Agents use scoped domain tools and cannot expand scope, call raw Git or bypass server-side gates.
  source:
    document: GitPM_Implementation_Plan_v0.4.md
    section: '19'
  owner: SEC
  stage: P12
  release_gate: beta
  acceptance_criteria:
  - Cross-project changes are denied before write.
  - Delete requires explicit permission and limit.
  tests:
  - E2E-022
  - E2E-023
  - E2E-024
- id: PERF-ALPHA-001
  description: Alpha performance is measured by a fixed 3 000-task benchmark protocol.
  source:
    document: GitPM_Delivery_Policies_v0.2.md
    section: '11'
  owner: SRE
  stage: P09
  release_gate: alpha
  acceptance_criteria:
  - Raw samples and runner manifest are retained.
  tests:
  - E2E-044
- id: PERF-RELEASE-001
  description: Release performance includes 10 000 tasks, 30 simulated users and 10 active drafts.
  source:
    document: GitPM_Delivery_Policies_v0.2.md
    section: '11'
  owner: SRE
  stage: P13B
  release_gate: release
  acceptance_criteria:
  - p95 and memory budgets pass on stable runner.
  tests:
  - E2E-045
- id: NO-BACKUP-001
  description: GitPM v0.1 performs no backup, replication or off-volume copy of repositories, safety refs or dirty worktrees.
  source:
    document: GitPM_Delivery_Policies_v0.2.md
    section: '8'
  owner: ARCH
  stage: P03
  release_gate: alpha
  acceptance_criteria:
  - UI and runbooks state that loss of persistent volume loses unpushed data.
  - No backup scheduler, remote or retention subsystem exists.
  tests:
  - E2E-033
  - E2E-034
- id: DRAFT-CONCURRENCY-001
  description: Optimistic concurrency rejects stale writes without data loss.
  source:
    document: GitPM_Implementation_Plan_v0.4.md
    section: '13'
  owner: BE
  stage: P04
  release_gate: alpha
  acceptance_criteria:
  - Stale blob SHA returns conflict.
  tests:
  - E2E-016
- id: CLEAN-INSTALL-001
  description: Supported clean installation is reproducible from locked sources.
  source:
    document: GitPM_Work_Plan_v0.3.md
    section: P00
  owner: ARCH
  stage: P00
  release_gate: alpha
  acceptance_criteria:
  - Clean Linux pipeline passes.
  tests:
  - E2E-030
- id: FAIL-GITLAB-001
  description: GitLab outages do not corrupt or discard local commits.
  source:
    document: GitPM_Implementation_Plan_v0.4.md
    section: '14'
  owner: BE
  stage: P06B
  release_gate: alpha
  acceptance_criteria:
  - Push/MR failures are retryable and idempotent.
  tests:
  - E2E-021
e2e:
- id: E2E-001
  title: Login and create draft
  stage: P09
  mandatory_from: alpha
  environment: real-gitlab
  actor: Contributor
  preconditions:
  - Configured single repository
  - Real GitLab OAuth app
  steps:
  - Login through GitLab
  - Create draft from main
  expected_result:
  - User identity is preserved
  - Separate branch/worktree exists
  evidence:
  - browser trace
  - Git refs
  - server log correlation id
  requirements:
  - REPO-SINGLE-001
  - GIT-WORKTREE-001
  - GITLAB-REAL-001
- id: E2E-002
  title: Create task through UI
  stage: P08A
  mandatory_from: alpha
  environment: browser-local
  actor: Contributor
  preconditions:
  - Open writable draft
  steps:
  - Create task with project and assignee
  expected_result:
  - File named by task ULID is created
  - Display key is stored only as attribute
  evidence:
  - screenshot
  - file diff
  - API trace
  requirements:
  - ID-ULID-001
  - DATA-FILE-001
  - SEC-BROWSER-001
  - UI-CORE-001
- id: E2E-003
  title: Update task and rename display key
  stage: P08A
  mandatory_from: alpha
  environment: browser-local
  actor: Contributor
  preconditions:
  - Existing linked task
  steps:
  - Change title and display key
  expected_result:
  - Only task file changes
  - References and path remain unchanged
  evidence:
  - semantic diff
  - Git diff
  requirements:
  - ID-ULID-001
  - ID-KEY-001
  - DATA-FILE-001
  - UI-CORE-001
- id: E2E-004
  title: Archive task
  stage: P08A
  mandatory_from: alpha
  environment: browser-local
  actor: Contributor
  preconditions:
  - Active task
  steps:
  - Press Archive
  expected_result:
  - lifecycle becomes archived
  - File remains
  evidence:
  - file diff
  - UI state
  requirements:
  - UI-CORE-001
