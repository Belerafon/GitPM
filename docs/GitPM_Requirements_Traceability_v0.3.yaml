requirements:
- id: ARCH-001
  description: Git является единственным источником бизнес-данных
  source:
    document: GitPM_Implementation_Plan_v0.5.md
    section: Git является единственным источником бизнес-данных
  owner: ARCH
  stage: P01
  release_gate: alpha
  acceptance_criteria:
  - Все доменные сущности представлены текстовыми файлами в Git.
  - Runtime state можно пересоздать из repository и worktree.
  tests:
  - E2E-024
- id: IDENT-001
  description: Одна неизменяемая идентичность сущности
  source:
    document: GitPM_Implementation_Plan_v0.5.md
    section: Одна неизменяемая идентичность сущности
  owner: ARCH
  stage: P01
  release_gate: alpha
  acceptance_criteria:
  - ID имеет типовой префикс и ULID, например TSK-01J...
  - Имя файла, ссылки и mutation API используют один и тот же ID.
  - Отдельного display key нет.
  tests:
  - E2E-004
  - E2E-019
- id: YAML-001
  description: Канонический и безопасный YAML
  source:
    document: GitPM_Implementation_Plan_v0.5.md
    section: Канонический и безопасный YAML
  owner: BE
  stage: P02
  release_gate: alpha
  acceptance_criteria:
  - Formatter идемпотентен.
  - Anchors, aliases, custom tags и duplicate keys запрещены.
  - Комментарии в доменных YAML не гарантируются.
  tests:
  - E2E-004
  - E2E-013
- id: VALID-001
  description: Структурная и ссылочная валидация
  source:
    document: GitPM_Implementation_Plan_v0.5.md
    section: Структурная и ссылочная валидация
  owner: BE
  stage: P02
  release_gate: alpha
  acceptance_criteria:
  - Проверяются схемы, ссылки, циклы, даты и путь файла.
  - Неизвестная schema version отклоняется без автоматической миграции.
  tests:
  - E2E-005
  - E2E-009
- id: MIGRATION-BOUNDARY-001
  description: Migration engine отсутствует в v0.1
  source:
    document: GitPM_Implementation_Plan_v0.5.md
    section: Migration engine отсутствует в v0.1
  owner: BE
  stage: P02
  release_gate: alpha
  acceptance_criteria:
  - Нет migrate API или CLI.
  - Переход на следующую schema version планируется отдельной будущей ревизией.
  tests:
  - E2E-005
- id: GIT-001
  description: Отдельный worktree на каждый draft
  source:
    document: GitPM_Implementation_Plan_v0.5.md
    section: Отдельный worktree на каждый draft
  owner: BE
  stage: P03
  release_gate: alpha
  acceptance_criteria:
  - Draft имеет отдельную ветку и worktree.
  - Параллельные draft не используют общую рабочую директорию.
  tests:
  - E2E-006
  - E2E-018
- id: DURABILITY-001
  description: Локальная сохранность без safety refs и backup
  source:
    document: GitPM_Implementation_Plan_v0.5.md
    section: Локальная сохранность без safety refs и backup
  owner: BE
  stage: P03
  release_gate: alpha
  acceptance_criteria:
  - Завершенная атомарная запись переживает restart при сохранном volume.
  - Потеря worktree или volume может уничтожить незакоммиченные данные.
  - GitPM не создает safety refs и backup.
  tests:
  - E2E-007
- id: DELETE-001
  description: Archive и физическое delete являются разными операциями
  source:
    document: GitPM_Implementation_Plan_v0.5.md
    section: Archive и физическое delete являются разными операциями
  owner: BE
  stage: P04
  release_gate: alpha
  acceptance_criteria:
  - Delete удаляет файл.
  - Archive сохраняет файл и меняет lifecycle.
  - Удаление адресуется только по immutable ID.
  tests:
  - E2E-008
  - E2E-009
- id: RESTORE-001
  description: Восстановление штатными операциями Git
  source:
    document: GitPM_Implementation_Plan_v0.5.md
    section: Восстановление штатными операциями Git
  owner: BE
  stage: P05
  release_gate: alpha
  acceptance_criteria:
  - Поддерживаются restore целого файла, удаленного файла и hunk.
  - Restore selected lines не входит в v0.1.
  tests:
  - E2E-011
  - E2E-012
  - E2E-013
  - E2E-021
- id: AUTH-001
  description: Прямая упрощенная модель прав GitLab
  source:
    document: GitPM_Implementation_Plan_v0.5.md
    section: Прямая упрощенная модель прав GitLab
  owner: BE
  stage: P06
  release_gate: alpha
  acceptance_criteria:
  - Guest/Reporter имеют read-only доступ.
  - Developer меняет собственные draft и создает MR.
  - Maintainer управляет административными сущностями и cleanup.
  - Отдельного authorization engine и permission DSL нет.
  tests:
  - E2E-014
  - E2E-016
  - E2E-020
- id: TOKEN-001
  description: OAuth token хранится только в памяти процесса
  source:
    document: GitPM_Implementation_Plan_v0.5.md
    section: OAuth token хранится только в памяти процесса
  owner: BE
  stage: P06
  release_gate: alpha
  acceptance_criteria:
  - Access token не пишется на диск.
  - Refresh token не сохраняется.
  - После restart пользователь входит повторно.
  tests:
  - E2E-015
  - E2E-031
- id: GITLAB-001
  description: GitLab API проверяется локальным test double
  source:
    document: GitPM_Implementation_Plan_v0.5.md
    section: GitLab API проверяется локальным test double
  owner: BE
  stage: P06
  release_gate: alpha
  acceptance_criteria:
  - Автотесты проверяют OAuth callback, push orchestration, MR и webhook контракты через test double.
  - Обязательный live GitLab test project отсутствует.
  tests:
  - E2E-014
  - E2E-016
  - E2E-017
  - E2E-023
  - E2E-030
- id: SINGLE-REPO-001
  description: Один настроенный repository
  source:
    document: GitPM_Implementation_Plan_v0.5.md
    section: Один настроенный repository
  owner: BE
  stage: P06
  release_gate: alpha
  acceptance_criteria:
  - UI не содержит repository selector.
  - Webhook принимает только настроенный project ID.
  tests:
  - E2E-016
  - E2E-017
  - E2E-018
- id: UI-CORE-001
  description: Core UI редактирует Project, Task и Milestone
  source:
    document: GitPM_Implementation_Plan_v0.5.md
    section: Core UI редактирует Project, Task и Milestone
  owner: FE
  stage: P08A
  release_gate: alpha
  acceptance_criteria:
  - CRUD доступен без ручного YAML.
  - Изменения сразу видны как изменения файлов draft.
  tests:
  - E2E-008
  - E2E-019
- id: UI-ADMIN-001
  description: Административный UI входит в v0.1
  source:
    document: GitPM_Implementation_Plan_v0.5.md
    section: Административный UI входит в v0.1
  owner: FE
  stage: P08B
  release_gate: alpha
  acceptance_criteria:
  - Есть управление Person, Team, Calendar и базовыми настройками.
  - Доступ определяется простой ролью GitLab.
  tests:
  - E2E-020
- id: DIFF-001
  description: Упрощенный semantic diff
  source:
    document: GitPM_Implementation_Plan_v0.5.md
    section: Упрощенный semantic diff
  owner: ARCH
  stage: P09
  release_gate: alpha
  acceptance_criteria:
  - Показываются created, updated, archived и deleted сущности.
  - Показываются измененные поля, число файлов и затронутые проекты.
  - Semantic diff не является planning или authorization engine.
  tests:
  - E2E-021
  - E2E-022
  - E2E-023
- id: HISTORY-001
  description: History и revert без rebase
  source:
    document: GitPM_Implementation_Plan_v0.5.md
    section: History и revert без rebase
  owner: BE
  stage: P10
  release_gate: beta
  acceptance_criteria:
  - Пользователь просматривает commits и создает revert draft.
  - Rebase API, conflict editor и three-way merge UI отсутствуют.
  tests:
  - E2E-025
- id: BOARD-001
  description: Kanban Board входит в v0.1
  source:
    document: GitPM_Implementation_Plan_v0.5.md
    section: Kanban Board входит в v0.1
  owner: FE
  stage: P11A
  release_gate: beta
  acceptance_criteria:
  - Drag-and-drop меняет status.
  - Сохраненные представления хранятся в Git.
  tests:
  - E2E-026
- id: CAL-001
  description: Упрощенная календарная модель
  source:
    document: GitPM_Implementation_Plan_v0.5.md
    section: Упрощенная календарная модель
  owner: BE
  stage: P11B
  release_gate: beta
  acceptance_criteria:
  - Используются date-only значения и рабочие дни недели.
  - Нет timezone/DST scheduling engine и автоматического перепланирования.
  tests:
  - E2E-027
- id: GANTT-001
  description: Gantt доступен только для чтения
  source:
    document: GitPM_Implementation_Plan_v0.5.md
    section: Gantt доступен только для чтения
  owner: FE
  stage: P11C
  release_gate: beta
  acceptance_criteria:
  - Gantt показывает иерархию, milestones, start/due и зависимости.
  - Drag дат и изменение длительности отсутствуют.
  tests:
  - E2E-028
- id: WORKLOAD-001
  description: Упрощенный Workload
  source:
    document: GitPM_Implementation_Plan_v0.5.md
    section: Упрощенный Workload
  owner: BE
  stage: P11D
  release_gate: beta
  acceptance_criteria:
  - Estimate равномерно распределяется по ISO-неделям между start и due.
  - Показывается сумма часов и превышение weekly_capacity.
  - Расчет явно помечен как приблизительный.
  tests:
  - E2E-029
- id: AGENT-001
  description: Агент работает через файлы и CLI без MCP
  source:
    document: GitPM_Implementation_Plan_v0.5.md
    section: Агент работает через файлы и CLI без MCP
  owner: BE
  stage: P12
  release_gate: beta
  acceptance_criteria:
  - Агент редактирует YAML в выделенном worktree.
  - Перед commit выполняются format, validate и semantic diff.
  - MCP server и доменный agent API отсутствуют.
  tests:
  - E2E-030
- id: NO-QUOTA-001
  description: Quota engine отсутствует
  source:
    document: GitPM_Implementation_Plan_v0.5.md
    section: Quota engine отсутствует
  owner: BE
  stage: P04
  release_gate: alpha
  acceptance_criteria:
  - Нет пользовательских, дисковых, draft или agent quotas.
  - Остаются только защитные технические limits размера request/file/output.
  tests:
  - E2E-010
- id: SEC-001
  description: Защищены filesystem, Git runner и browser surface
  source:
    document: GitPM_Implementation_Plan_v0.5.md
    section: Защищены filesystem, Git runner и browser surface
  owner: SEC
  stage: P13A
  release_gate: release
  acceptance_criteria:
  - Path traversal, symlink, Git hooks/filters и XSS fixtures отклоняются.
  - Secrets не попадают в logs и process arguments.
  tests:
  - E2E-003
  - E2E-010
  - E2E-017
  - E2E-031
- id: OBS-001
  description: Минимальная наблюдаемость
  source:
    document: GitPM_Implementation_Plan_v0.5.md
    section: Минимальная наблюдаемость
  owner: ARCH
  stage: P00
  release_gate: alpha
  acceptance_criteria:
  - Есть health endpoints, structured logs и correlation ID.
  - Измеряется duration Git operations и ошибки GitLab API.
  - Полноценная metrics platform не обязательна.
  tests:
  - E2E-001
- id: PERF-001
  description: Smoke performance с простыми бюджетами
  source:
    document: GitPM_Implementation_Plan_v0.5.md
    section: Smoke performance с простыми бюджетами
  owner: QA
  stage: P13B
  release_gate: release
  acceptance_criteria:
  - Cold load 3000 tasks не более 5 секунд на reference machine.
  - Изменение и validation одной задачи не более 1 секунды.
  - Semantic diff 100 файлов не более 3 секунд.
  - Используется median трех измерений без сложной p95 методики.
  tests:
  - E2E-032
- id: PLAN-001
  description: Planning documents поддерживаются по формальной инструкции
  source:
    document: GitPM_Implementation_Plan_v0.5.md
    section: Planning documents поддерживаются по формальной инструкции
  owner: ARCH
  stage: P00
  release_gate: alpha
  acceptance_criteria:
  - Изменения выполняются в порядке из Planning Maintenance Guide.
  - Validator и mutation tests запускаются перед planning commit.
  - PROGRESS содержит только фактические evidence и next action.
  tests:
  - E2E-002
  - E2E-024
  - E2E-032
e2e:
- id: E2E-001
  title: Clean install и health
  stage: P00
  mandatory_from: alpha
  environment: ci-clean-linux
  actor: operator
  preconditions:
  - Чистая рабочая копия и поддерживаемая Node/Python среда
  steps:
  - Установить зависимости
  - Запустить health smoke
  expected_result:
  - Процесс стартует; live и ready отвечают успешно
  evidence:
  - CI log
  - health response
  requirements:
  - OBS-001
- id: E2E-002
  title: Planning validator и maintenance workflow
  stage: P00
  mandatory_from: alpha
  environment: ci-clean-linux
  actor: maintainer
  preconditions:
  - Активные planning documents
  steps:
  - Запустить planning validator
  - Запустить mutation self-tests
  expected_result:
  - Обе команды успешны; намеренные поломки отклоняются
  evidence:
  - validator output
  requirements:
  - PLAN-001
- id: E2E-003
  title: Filesystem и Git runner spike
  stage: P00S
  mandatory_from: release
  environment: security-local
  actor: attacker
  preconditions:
  - Fixtures path traversal, symlink и malicious Git config
  steps:
  - Выполнить риск-spike suite
  expected_result:
  - Опасные пути и исполняемые Git extensions отклонены
  evidence:
  - security test report
  requirements:
  - SEC-001
- id: E2E-004
  title: Format round-trip
  stage: P02
  mandatory_from: alpha
  environment: integration-local
  actor: developer
  preconditions:
  - Валидный fixture repository
  steps:
  - Parse
  - Format два раза
  - Сравнить второй и третий результат
  expected_result:
  - Formatter идемпотентен; ID и ссылки неизменны
