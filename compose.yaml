services:
  gitpm:
    build:
      context: .
    image: gitpm-local
    restart: unless-stopped
    environment:
      GITPM_REPOSITORY_PATH: /repository
      GITPM_DATA_DIR: /data
    ports:
      - "3000:3000"
      - "5173:5173"
    volumes:
      - type: bind
        source: ${GITPM_REPOSITORY_PATH:?Set GITPM_REPOSITORY_PATH to the host Git repository directory}
        target: /repository
      - type: volume
        source: gitpm-data
        target: /data
      # Uncomment to persist .gitpm/config.json (OAuth client_id etc.)
      # across container recreation:
      # - type: volume
      #   source: gitpm-config
      #   target: /app/.gitpm

# For server deployment (LAN bind IP, OAuth, healthcheck, .gitpm volume)
# use the optional `compose.server.yaml` override:
#   docker compose -f compose.yaml -f compose.server.yaml up -d --build

volumes:
  gitpm-data:
